<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} Document {% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- CSS Global -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">

    {% block head %} {% endblock %}
</head>

<body>

    <!-- HEADER -->
    <header id="header">
        <div class="flex">

            <!-- Logo -->
            <p> DataSystem InfoCell </p>

            <!-- Menu -->
            <nav>
                <ul>
                    <li><a href="{{url_for('homepage')}}"><i class="bi bi-house"></i> Página inicial </a></li>
                    <li><a href="#"><i class="bi bi-box-seam"></i> Produtos</a></li>
                    <li><a href="#"><i class="bi bi-people"></i> Sobre nós</a></li>
                    <li>
                        <button class="botao-header">
                            <i class="bi bi-envelope"></i> Contato
                        </button>
                    </li>
                </ul>
            </nav>

            <!-- Login -->
            <div id="login" class="rounded">
                <a href="{{url_for('Register')}}">
                    <i class="bi bi-person-circle"></i>
                    <span>Cadastre-se</span>
                </a>
            </div>

        </div>
    </header>

    {% block content %} {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
        crossorigin="anonymous"></script>

</body>

</html>
